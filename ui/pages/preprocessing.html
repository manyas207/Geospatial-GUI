<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Preprocessing</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body class="step-page">
  <h2>Preprocessing</h2>
  <p>Select preprocessing steps to run on the chosen scenes.</p>

  <div class="checkbox-group">
    <label><input type="checkbox" name="prep" value="stack_bands" checked /> Stack bands</label>
    <label><input type="checkbox" name="prep" value="clip" checked /> Clipping image</label>
    <label><input type="checkbox" name="prep" value="cloud_mask" checked /> Cloud masking</label>
    <label><input type="checkbox" name="prep" value="mosaic" checked /> Mosaicing</label>
    <label><input type="checkbox" name="prep" value="spectral_indices" checked /> Spectral index generation</label>
  </div>

  <div class="field">
    <label for="indices">Indices (comma-separated)</label>
    <input id="indices" type="text" value="ndvi,ndwi" />
  </div>

  <div class="actions">
    <button type="button" id="run-prep">Run preprocessing</button>
    <button type="button" id="next">Continue to analysis</button>
  </div>

  <script>
    document.getElementById("next").addEventListener("click", () => {
      parent.postMessage({ type: "navigate", step: "analysis" }, "*");
    });
  </script>
</body>
</html>
