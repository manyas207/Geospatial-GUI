<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Accuracy Assessment</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body class="step-page">
  <h2>Accuracy assessment</h2>

  <div class="field">
    <label for="reference">Reference labels (vector or raster)</label>
    <input id="reference" type="file" />
  </div>

  <ul>
    <li>Overall accuracy</li>
    <li>Precision (per class)</li>
    <li>Statistical metrics (recall, F1, kappa, …)</li>
  </ul>

  <div class="actions">
    <button type="button" id="run-accuracy">Calculate metrics</button>
    <button type="button" id="next">Open dashboard</button>
  </div>

  <script>
    document.getElementById("next").addEventListener("click", () => {
      parent.postMessage({ type: "navigate", step: "dashboard" }, "*");
    });
  </script>
</body>
</html>
