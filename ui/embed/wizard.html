<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geospatial Workflow</title>
  <!-- Full workflow as one page (no nested iframes) for external embedding -->
  <link rel="stylesheet" href="../assets/css/embed.css" />
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body class="embed-root" data-embed="wizard">
  <header class="embed-header">
    <h1>Geospatial analysis</h1>
    <nav class="step-nav" aria-label="Workflow steps">
      <button type="button" data-panel="inputs" class="active">Inputs</button>
      <button type="button" data-panel="preprocessing">Preprocessing</button>
      <button type="button" data-panel="analysis">Analysis</button>
      <button type="button" data-panel="accuracy">Accuracy</button>
      <button type="button" data-panel="dashboard">Dashboard</button>
    </nav>
  </header>

  <main class="embed-main">
    <section id="panel-inputs" class="wizard-panel active" data-panel="inputs">
      <h2>Dataset &amp; AOI</h2>
      <div class="field">
        <label for="years">Year(s)</label>
        <input id="years" type="text" placeholder="e.g. 2020,2021 or 2019-2022" />
      </div>
      <div class="field">
        <label for="sensor">Sensor</label>
        <select id="sensor">
          <option value="hls">HLS</option>
          <option value="landsat">Landsat</option>
          <option value="sentinel">Sentinel</option>
        </select>
      </div>
      <div class="field">
        <label for="aoi">AOI file</label>
        <input id="aoi" type="file" accept=".geojson,.json,.gpkg,.shp,.kml" />
      </div>
    </section>

    <section id="panel-preprocessing" class="wizard-panel" data-panel="preprocessing" hidden>
      <h2>Preprocessing</h2>
      <div class="checkbox-group">
        <label><input type="checkbox" checked /> Stack bands</label>
        <label><input type="checkbox" checked /> Clipping</label>
        <label><input type="checkbox" checked /> Cloud masking</label>
        <label><input type="checkbox" checked /> Mosaicing</label>
        <label><input type="checkbox" checked /> Spectral indices</label>
      </div>
    </section>

    <section id="panel-analysis" class="wizard-panel" data-panel="analysis" hidden>
      <h2>Analysis</h2>
      <div class="checkbox-group">
        <label><input type="checkbox" value="pixel_based" /> Pixel based</label>
        <label><input type="checkbox" value="object_based" /> Object based</label>
        <label><input type="checkbox" value="deep_learning" /> Deep learning</label>
      </div>
    </section>

    <section id="panel-accuracy" class="wizard-panel" data-panel="accuracy" hidden>
      <h2>Accuracy assessment</h2>
      <p>Overall accuracy, precision, and statistical metrics.</p>
      <div class="field">
        <label for="reference">Reference labels</label>
        <input id="reference" type="file" />
      </div>
    </section>

    <section id="panel-dashboard" class="wizard-panel" data-panel="dashboard" hidden>
      <p>Opens the dedicated dashboard embed, or inline summary once wired to the API.</p>
      <a class="embed-link" href="dashboard.html" target="_blank" rel="noopener">Open dashboard</a>
    </section>
  </main>

  <script src="../assets/js/embed-bridge.js"></script>
  <script src="../assets/js/wizard-embed.js"></script>
</body>
</html>
