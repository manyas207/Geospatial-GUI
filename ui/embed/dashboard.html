<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geospatial Dashboard</title>
  <!-- Standalone page for external sites: <iframe src="https://your-api.example/embed/dashboard.html"> -->
  <link rel="stylesheet" href="../assets/css/embed.css" />
</head>
<body class="embed-root" data-embed="dashboard">
  <header class="embed-header">
    <h1>Analysis dashboard</h1>
  </header>

  <main class="embed-main">
    <div class="panel-grid">
      <section class="card" id="maps-panel">
        <h2>Maps</h2>
        <p class="placeholder">AOI, basemap, and classification layers.</p>
      </section>
      <section class="card" id="class-panel">
        <h2>Classifications</h2>
        <p class="placeholder">Legend and area-by-class summary.</p>
      </section>
      <section class="card" id="perf-panel">
        <h2>Model performance</h2>
        <p class="placeholder">Comparative metrics across methods.</p>
      </section>
      <section class="card" id="summary-panel">
        <h2>Summary report</h2>
        <p class="placeholder">Run metadata and accuracy narrative.</p>
      </section>
    </div>

    <section class="downloads">
      <h2>Download</h2>
      <div class="download-row">
        <button type="button" data-format="pdf">PDF report</button>
        <button type="button" data-format="csv">CSV metrics</button>
        <button type="button" data-format="geopackage">GeoPackage</button>
      </div>
    </section>
  </main>

  <script src="../assets/js/embed-bridge.js"></script>
  <script src="../assets/js/dashboard-embed.js"></script>
</body>
</html>
